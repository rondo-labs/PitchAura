site_name: PitchAura
site_description: Football spatial analytics computation engine
site_url: https://pitchaura.readthedocs.io
repo_url: https://github.com/rondo-labs/PitchAura
repo_name: rondo-labs/PitchAura

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
    - Pitch Control: guides/pitch_control.md
    - Tactics & Gravity: guides/tactics.md
    - Cognitive Models: guides/cognitive.md
    - Sync Utilities: guides/sync.md
    - Visualization: guides/viz.md
  - API Reference:
    - Types: api/types.md
    - Space: api/space.md
    - Tactics: api/tactics.md
    - Cognitive: api/cognitive.md
    - Sync: api/sync.md
    - Viz: api/viz.md
